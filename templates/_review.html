<div class="review-item">
  <a href="{{ url_for('main.profile', user_id=review.reviewer.id) }}">{{ review.reviewer.name }} {{ review.reviewer.surname }}</a> says:
  <div class="review-text">{{ review.text }}</div>
  <div class="review-stars" aria-label="{{ review.stars }} out of 5 stars">
    {% for star_index in range(1, 6) %}
      <span class="{% if star_index <= review.stars %}filled-star{% else %}empty-star{% endif %}">★</span>
    {% endfor %}
  </div>
  {% if is_librarian %}
    <form class="admin-inline-form" action="{{ url_for('main.edit_review', review_id=review.id) }}" method="post">
      <textarea name="text" rows="2" maxlength="200" required>{{ review.text }}</textarea>
      <label for="edit-review-stars-{{ review.id }}">Stars</label>
      <select id="edit-review-stars-{{ review.id }}" name="stars" required>
        {% for star in range(1, 6) %}
          <option value="{{ star }}" {% if star == review.stars %}selected{% endif %}>{{ star }}</option>
        {% endfor %}
      </select>
      <button class="admin-inline-button" type="submit">Save review</button>
    </form>
    <form class="admin-inline-form" action="{{ url_for('main.delete_review', review_id=review.id) }}" method="post">
      <button class="admin-inline-button" type="submit">Delete comment</button>
    </form>
  {% endif %}
</div>
